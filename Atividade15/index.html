<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    
</head>

<body>

    <div class="container">

        <h1>Formulário Principal</h1>

        <form name="nomeform" onsubmit="return validarFormulario()">

            <label>Nome:</label>
            <input type="text" name="nome" id="nome">

            <label>E-mail:</label>
            <input type="email" name="email" id="email">

            <label>Comentário:</label>
            <textarea name="comentario" id="comentario" rows="5"></textarea>

            <label>Pesquisa:</label>
            <p>Primeira vez nesta página?</p>

            <div class="radio-group">
                <input type="radio" name="pesquisa" value="sim"> Sim
                <input type="radio" name="pesquisa" value="nao"> Não
            </div>

            <div class="buttons">
                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>
            </div>

        </form>
    </div>
</body>
</html>
