<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <title>Atividade JS</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

    <div class="container">
        <h1>Testar Funções</h1>

        <h3>1) Maior de três números</h3>
        <input type="number" id="n1">
        <input type="number" id="n2">
        <input type="number" id="n3">
        <button onclick="executarMaior()">Calcular</button>
        <p id="res1"></p>

        <h3>2) Ordem crescente</h3>
        <input type="number" id="o1">
        <input type="number" id="o2">
        <input type="number" id="o3">
        <button onclick="executarOrdenar()">Ordenar</button>
        <p id="res2"></p>

        <h3>3) Palíndromo</h3>
        <input type="text" id="texto">
        <button onclick="executarPalindromo()">Verificar</button>
        <p id="res3"></p>

        <h3>4) Subconjunto</h3>
        <input type="text" id="p1" placeholder="Palavra 1">
        <input type="text" id="p2" placeholder="Palavra 2">
        <button onclick="executarSubconjunto()">Verificar</button>
        <p id="res4"></p>

        <h3>5) Dia da semana</h3>
        <input type="date" id="data">
        <button onclick="executarData()">Verificar</button>
        <p id="res5"></p>

        <script src="script.js"></script>

        </div>
    </body>
</html>
